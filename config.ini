[app]
title = Figion — Aflatoksin Tespit Sistemi
version = 1.0.0

[camera]
camera_index = 0
width = 1280
height = 720
fps = 30

[model]
model_path = models/final_model.pt
conf_threshold = 0.50
iou_threshold = 0.45
input_size = 640


[database]
db_path = data/figion.db

[storage]
images_dir = data/images
logs_dir = data/logs
exports_dir = data/exports

[ui]
theme = dark
video_fps_target = 30

[vision]
stability_required = 2
stable_iou_threshold = 0.35
max_missing_frames = 3
min_candidate_area_px = 2500
min_candidate_area_ratio = 0.006
max_candidate_area_ratio = 0.80
candidate_padding_ratio = 0.08